# Adversary base configuration — slug maps, selection heuristics, environment patterns

# Maps user-friendly names to canonical file slugs
base_slug_map:
  spy: spy
  noble: noble
  guard: guard
  veteran: veteran
  bandit captain: bandit-captain
  bandit-captain: bandit-captain
  bandit: bandit
  thug: thug
  scout: scout
  mage: mage
  priest: priest
  acolyte: acolyte
  assassin: assassin
  archmage: archmage
  commoner: commoner
  knight: knight
  berserker: berserker
  gladiator: gladiator

# Bases that can appear in anchored proposal selection
allowed_proposal_bases:
  - spy
  - scout
  - guard
  - veteran
  - bandit
  - bandit captain
  - thug
  - assassin

# Valid SRD base names for citation checks
valid_srd_base_names:
  - spy
  - noble
  - guard
  - veteran
  - bandit captain
  - bandit-captain
  - bandit
  - thug
  - scout
  - mage
  - priest
  - acolyte
  - assassin
  - archmage
  - commoner

# Bases that don't have darkvision in the SRD
bases_without_darkvision:
  - spy
  - noble
  - guard
  - bandit
  - bandit captain
  - bandit-captain
  - thug
  - scout
  - commoner
  - mage
  - priest
  - acolyte
  - assassin
  - archmage
  - veteran

# Context heuristics: pattern → preferred_base
# Checked in order; first match wins. If no match, spy is default.
base_selection_heuristics:
  - pattern: 'blend(?:ing)?\s+in|social|urban|town|cit|market|disguise|infiltrat'
    preferred_base: spy
  - pattern: 'road|checkpoint|patrol|trail|scout|track'
    preferred_base: scout
  - pattern: 'captain|leader|veteran|dangerous|hard.to.kill'
    preferred_base: veteran
default_base: spy

# Environment context detection: pattern → label
environment_contexts:
  - pattern: 'urban|town|cit|settlement|market|harbour|dock|inn|tavern'
    label: 'urban / towns / cities'
  - pattern: 'road|wilderness|outdoor|forest|coast|fjord'
    label: 'road / wilderness'

