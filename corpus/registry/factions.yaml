# canonical_languages: whitelist-enforced. Anything not on this list warns in validation.
# Design decisions encoded here are intentional — e.g. Lösweg Sign added 2026-06-02
# because it is a reasonable Lösweg-specific language fitting the setting's sign
# language convention (Shadow Walker Sign already exists as a precedent).
canonical_languages:
  - Common
  - Dwarvish
  - Elvish
  - Giant
  - Gnomish
  - Goblin
  - Halfling
  - Orc
  - Draconic
  - Primordial
  - Celestial
  - Sylvan
  - Trade Tongue (local)
  - local trade tongue
  - one local trade tongue
  - Shadow Walker Sign
  - Shadow Walker signs
  - Lösweg Sign
  - Losweg Sign

factions:
  - slug: shadow-walkers
    display_name: Shadow Walkers
    aliases:
      - Shadow Walker
      - Shadow Walkers
    default_alignment: neutral
    allowed_alignments:
      - neutral
    language_whitelist:
      - Common
      - Trade Tongue (local)
      - local trade tongue
      - one local trade tongue
      - Shadow Walker Sign
      - Shadow Walker signs
    banned_languages:
      - Undercommon
      - Abyssal
      - Infernal
      - Deep Speech
    spellcasting:
      default: prohibited
      allow_with_explicit_override: true
    preferred_weapons:
      - concealed blade
      - work knife
      - throwing spike
      - tally blade
    discouraged_weapons_for_cover_identity:
      - shortbow
      - longbow
      - heavy crossbow
      - greatsword
      - halberd
    ability_floors:
      observer:
        wis: 12
      infiltrator:
        dex: 12
        cha: 12
    doctrine_tags:
      - secrecy
      - restraint
      - mission-first
      - controlled-withdrawal
      - information-preservation
      - cover-identity
      - unremarkable-presence
      - urban-infiltration
    preferred_concealable_weapons:
      - name: Throwing Spike
        type: ranged
        range: 20/60 ft.
        damage_die: 1d4
        ability: dex
        rider: If the target is a creature, it must succeed on a DC 13 Constitution saving throw or its speed is reduced by 10 feet until the end of its next turn.
      - name: Concealed Blade
        type: melee
        reach: 5 ft.
        damage_die: 1d4
        ability: dex
        rider: The blade is disguised as a work knife, tally blade, or ordinary tool until used.
    required_doctrine_themes:
      - secrecy
      - restraint
      - mission-first behaviour
      - controlled withdrawal
      - information preservation
    style_notes:
      - Shadow Walkers stay legible as ordinary settlement life until pressure closes.
      - They preserve information and cover identity before pride.
      - Urban tools should look mundane, concealable, and deniable.
    generation_constraints:
      - 'Shadow Walker doctrine must include restraint-as-discipline, controlled withdrawal, and information preservation.'
      - 'Shadow Walker urban cover identities must not keep shortbow, longbow, or heavy crossbow. Use throwing spike or concealed blade instead.'
      - 'Shadow Walker urban infiltrators should usually use Common, Trade Tongue (local), and Shadow Walker Sign.'
      - 'If doctrine involves observation, reading, or assessment, Wisdom should normally be 12 or higher.'
    validation_rules:
      - pattern: '\bneutral evil\b|\blawful evil\b|\bchaotic evil\b'
        severity: fail
        message: 'Alignment convention: Shadow Walker variants must not include an evil alignment component.'
      - pattern: '\bshortbow\b|\blongbow\b'
        secondary_pattern: '\bcover identity|unremarkable presence|blend(?:ing)? in|urban infiltr'
        severity: warn
        message: 'Shortbow/concealability flag: concealment doctrine should use a faction-appropriate concealable weapon such as a throwing spike.'
      - pattern: '\bminor illusion\b|\bcantrip\b|\bspellcasting\b|\bspell attack\b'
        severity: warn
        message: 'Spell capability flag: Shadow Walker variants should justify any spell use explicitly.'
      - pattern: '\bobservation\b|\bread(?:ing)? people\b|\bassessment\b|\bkeen observer\b|\bwatch(?:es|ing)?\b'
        secondary_pattern: '\|\s*\d+\s*\([^)]+\)\s*\|\s*\d+\s*\([^)]+\)\s*\|\s*\d+\s*\([^)]+\)\s*\|\s*\d+\s*\([^)]+\)\s*\|\s*10\s*\(\+0\)\s*\|'
        severity: warn
        message: 'Wisdom floor: Shadow Walkers observation doctrine usually expects WIS 12+.'
    detection:
      mention_pattern: '\bshadow(?:\s|-)?walkers?\b'
      positive_patterns:
        - '\bpart\s+of\s+(?:the\s+)?shadow(?:\s|-)?walkers?(?:\s+faction)?\b'
        - '\bbelongs?\s+to\s+(?:the\s+)?shadow(?:\s|-)?walkers?\b'
        - '\bserves?\s+(?:the\s+)?shadow(?:\s|-)?walkers?\b'
        - '\bworks?\s+for\s+(?:the\s+)?shadow(?:\s|-)?walkers?\b'
        - '\breports?\s+to\s+(?:the\s+)?shadow(?:\s|-)?walkers?\b'
        - '\blinked\s+to\s+(?:the\s+)?shadow(?:\s|-)?walkers?\b'
        - '\bshadow(?:\s|-)?walkers?\s+faction\b'
        - '\bshadow(?:\s|-)?walker\s+(?:agent|operative|network)\b'
      dm_notes_synonyms:
        - shadow-walker
        - shadow walker
    doctrine_support_mechanics:
      - label: 'bonus action Disengage or Hide'
        pattern: '\bbonus action\b[\s\S]{0,160}\b(disengage|hide)\b|\bcunning action\b'
        reliable_under_pressure: true
      - label: 'reaction movement on being hit'
        pattern: '\bwhen\b[\s\S]{0,40}\bhit by an attack\b[\s\S]{0,180}\breaction\b[\s\S]{0,180}\b(move up to|half its speed|without provoking opportunity attacks|disengage|hide)\b|\breaction\b[\s\S]{0,180}\bwhen\b[\s\S]{0,40}\bhit by an attack\b[\s\S]{0,180}\b(move up to|half its speed|without provoking opportunity attacks|disengage|hide)\b|\bwhen\b[\s\S]{0,60}\b(hit or missed by an attack|reduced below half hit points|bloodied|exposed by name)\b[\s\S]{0,220}\breaction\b[\s\S]{0,180}\b(move up to|half its speed|without provoking opportunity attacks|disengage|hide)\b|\breaction\b[\s\S]{0,220}\bwhen\b[\s\S]{0,60}\b(hit or missed by an attack|reduced below half hit points|bloodied|exposed by name)\b[\s\S]{0,180}\b(move up to|half its speed|without provoking opportunity attacks|disengage|hide)\b'
        reliable_under_pressure: true
      - label: 'reaction movement on being missed'
        pattern: '\bwhen (?:a creature )?miss(?:es|ed)\b[\s\S]{0,180}\breaction\b[\s\S]{0,180}\b(move up to|half its speed|without provoking opportunity attacks|disengage|hide)\b|\breaction\b[\s\S]{0,180}\bwhen (?:a creature )?miss(?:es|ed)\b[\s\S]{0,180}\b(move up to|half its speed|without provoking opportunity attacks|disengage|hide)\b'
        reliable_under_pressure: false
      - label: 'first-round prepared movement'
        pattern: '\badvantage on initiative\b|\bmapped exits\b|\bon the first round of combat\b[\s\S]{0,140}\b(move up to|half its speed|without provoking opportunity attacks)\b'
        reliable_under_pressure: true
      - label: 'crowd or urban cover mechanic'
        pattern: '\bcrowd break\b|\bcrowd dissolution\b|\burban camouflage\b|\bblend\b|\bcamouflage\b|\bat least two non-hostile creatures\b|\bsignificant cover\b|\bgain(?:s)? cover\b'
        reliable_under_pressure: true
      - label: 'smoke, crowd, or social distraction'
        pattern: '\bdistraction\b|\bpublic misdirection\b|\bsmoke\b|\bfalse lead\b|\bwhispered suggestion\b|\bdelay someone\b'
        reliable_under_pressure: true
      - label: 'information protection on pressure'
        pattern: '\bbelow half hit points\b[\s\S]{0,160}\b(conceal|destroy|pass on)\b[\s\S]{0,120}\b(note|cipher strip|message|ledger|record|tally|chit)\b|\bexposed by name\b[\s\S]{0,160}\b(conceal|destroy|pass on)\b[\s\S]{0,120}\b(note|cipher strip|message|ledger|record|tally|chit)\b|\bbloodied\b[\s\S]{0,160}\b(conceal|destroy|pass on)\b'
        reliable_under_pressure: true
      - label: 'escape route in prepared urban location'
        pattern: '\bprepared urban location\b|\bmapped exits\b|\bescape route\b|\bservice corridor\b|\brear stair\b|\bdock ladder\b'
        reliable_under_pressure: true
      - label: 'non-lethal disabling effect'
        pattern: '\bnon-?lethal\b|\bunconscious\b|\bsedated\b|\bstunned\b|\brestrain(?:ed)?\b|\bgrappled\b|\bpoisoned\b'
        reliable_under_pressure: true
      - label: 'explicit morale or withdrawal trigger'
        pattern: '\bbelow half hit points\b[\s\S]{0,120}\b(attempts to flee|attempts to surrender|attempts to withdraw|breaks contact|retreats)\b|\bnamed publicly\b[\s\S]{0,120}\b(attempts to flee|attempts to surrender|attempts to withdraw|breaks contact|retreats)\b|\brestrained\b[\s\S]{0,120}\b(attempts to flee|attempts to surrender|attempts to withdraw|breaks contact|retreats)\b|\bseparated from (?:its|their) cover identity\b[\s\S]{0,120}\b(attempts to flee|attempts to surrender|attempts to withdraw|breaks contact|retreats)\b|\bno last stand\b'
        reliable_under_pressure: true

