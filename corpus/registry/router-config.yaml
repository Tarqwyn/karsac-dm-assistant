# Pattern that indicates explicit encounter/scene intent (overrides adversary-design routing)
explicit_encounter_scene_pattern: '\bdesign\s+an?\s+encounter\b|\bcreate\s+an?\s+(?:scene|encounter)\b|\b(?:dock|gate|arrival|road)\s+encounter\b|\bencounter\s+scene\b'

# Proposal routing — adversary detection pattern (proposalRouting.ts)
adversary_proposal_pattern: '\bnew\s+adversary\b|\badversary\b|\bfaction\s+(?:agent|member|operative)\b|\bmartial\s+threat\b|\bcombat\s+threat\b|\bif\s+confronted\b|\bencountered\s+(?:alone|in\s+pairs?)\b|\btraits?\s+and\s+actions?\b|\bstat\s+block\b|\bdm\s+can\s+choo?s\b|\bx\s+out\s+of\s+y\b|\bvariant\b[^.]*(?:faction|threat|danger|shadow|blend)\b|\bblending\s+in\b[^.]*(?:faction|shadow|hidden|agent)\b|\binfiltrator\b|\bnot\s+as\s+dangerous\s+as\b'

# Adversary diagnostic term checks — labeled for reporting
adversary_term_checks:
  - pattern: '\bnew\s+adversary\b'
    label: 'new adversary'
  - pattern: '\badversary\b'
    label: adversary
  - pattern: '\bmartial\s+threat\b'
    label: 'martial threat'
  - pattern: '\bif\s+confronted\b'
    label: 'if confronted'
  - pattern: '\bencountered\s+alone\b'
    label: 'encountered alone'
  - pattern: '\btraits?\s+and\s+actions?\b'
    label: 'traits and actions'
  - pattern: '\bstat\s+block\b'
    label: 'stat block'
  - pattern: '\bdm\s+can\s+choo?s\b'
    label: 'dm can choose'
  - pattern: '\binfiltrator\b'
    label: infiltrator
  - pattern: '\bblending\s+in\b'
    label: 'blending in'
  - pattern: '\bnot\s+as\s+dangerous\b'
    label: 'not as dangerous'
  - pattern: '\bvariant\b'
    label: variant

