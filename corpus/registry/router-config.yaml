# Explicit proposal opening patterns — type detected from prompt opening phrase
# Each entry: pattern (regex string) + proposal_type
explicit_proposal_opening_patterns:
  - pattern: '^\s*(?:please\s+)?propose\s+(?:a|an)\s+new\s+npc\b'
    proposal_type: npc
  - pattern: '^\s*(?:please\s+)?propose\s+(?:a|an)\s+new\s+adversary\b'
    proposal_type: adversary
  - pattern: '^\s*(?:please\s+)?propose\s+(?:a|an)\s+new\s+place\b'
    proposal_type: place
  - pattern: '^\s*(?:please\s+)?propose\s+(?:a|an)\s+new\s+encounter\b'
    proposal_type: encounter
  - pattern: '^\s*(?:please\s+)?propose\s+(?:a|an)\s+new\s+scene\b'
    proposal_type: scene
  - pattern: '^\s*(?:please\s+)?propose\s+(?:a|an)\s+new\s+item\b'
    proposal_type: item
  - pattern: '^\s*(?:please\s+)?propose\s+(?:a|an)\s+new\s+clue\b'
    proposal_type: clue
  - pattern: '^\s*(?:please\s+)?propose\s+(?:a|an)\s+new\s+handout\b'
    proposal_type: handout
  - pattern: '^\s*(?:please\s+)?propose\s+(?:a|an)\s+new\s+state(?:\s+update)?\b'
    proposal_type: state-update
  - pattern: '^\s*(?:please\s+)?propose\s+(?:a|an)\s+new\s+session(?:\s+outline)?\b'
    proposal_type: session-outline
  - pattern: '^\s*(?:please\s+)?propose\s+(?:a|an)\s+new\s+chapter(?:\s+outline)?\b'
    proposal_type: chapter-outline

# Validator mismatch guard patterns (proposalValidator.ts)
adversary_prompt_signals: '\bnew\s+adversary\b|\badversary\b|\bmartial\s+threat\b|\btraits?\s+and\s+actions?\b|\bstat\s+block\b|\bif\s+confronted\b|\bencountered\s+(?:alone|in\s+pairs?)\b|\bdm\s+can\s+choo?s\b'
npc_prompt_signals: '^\s*(?:please\s+)?propose\s+(?:a|an)\s+new\s+npc\b'
